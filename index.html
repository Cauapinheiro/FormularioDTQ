<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador - VLI</title>
    <link href="informativo.css" rel="stylesheet">
    <script src="informativo.js" defer></script>
</head>

<body>

<header class="header">
    <div class="container header-content">
        <h1>Gerador Operacional</h1>
        <button id="theme-toggle" class="btn-theme">🌓 Alternar Tema</button>
    </div>
</header>

<!-- ABAS -->
<div class="tab-bar">
    <button class="tab-btn active" id="tab-dtq" onclick="trocarAba('dtq')">🚧 Trilho Quebrado</button>
    <button class="tab-btn" id="tab-ccm" onclick="trocarAba('ccm')">🚨 Alerta CCM</button>
    <button class="tab-btn" id="tab-pt" onclick="trocarAba('pt')">📋 Passagem de Turno</button>
</div>

<main class="grid">

    <!-- ✅ ABA 1 - DTQ -->
    <section id="aba-dtq" class="card">
        <div class="section-title">Trilho Quebrado</div>

        <div class="form-container">
            <div class="row-2">
                <div>
                    <label>Título</label>
                    <input id="titulo" type="text" value="*Alarme de Trilho Quebrado*">
                </div>
                <div>
                    <label>Local</label>
                    <input id="local" type="text">
                </div>
            </div>

            <div class="row-2">
                <div>
                    <label>Data/Hora</label>
                    <input id="dataHora" type="datetime-local">
                </div>
                <div>
                    <label>Resistência</label>
                    <input id="resistencia" type="number">
                </div>
            </div>

            <div class="row-2">
                <div>
                    <label>Previsão</label>
                    <input id="previsao" type="text">
                </div>
            </div>

            <div class="full-row">
                <label>Situação</label>
                <textarea id="situacao"></textarea>
            </div>
        </div>

        <div class="actions">
            <button onclick="gerar()" class="btn-primary">Gerar</button>
            <button onclick="copiar()" class="btn-secondary">Copiar</button>
        </div>
    </section>


    <!-- ✅ ABA 2 - CCM -->
    <section id="aba-ccm" class="card" style="display:none;">
        <div class="section-title">Alerta CCM</div>

        <div class="form-container">

    <!-- Linha 1 -->
    <div class="row-2">
        <div>
            <label>Tipo de Equipamento</label>
            <input id="tipoEquipamento">
        </div>
        <div>
            <label>TAG</label>
            <input id="tag">
        </div>
    </div>

    <div class="full-row">
        <label>Descrição do Ativo</label>
        <input id="descricaoAtivo">
    </div>

    <!-- Linha 2 -->
    <div class="row-2">
        <div>
            <label>Trem</label>
            <input id="trem">
        </div>
        <div>
            <label>Data/Hora</label>
            <input id="dataHoraCCM" type="text" placeholder="Ex: 22/05/2026 09:15">
        </div>
    </div>

    <!-- Linha 3 -->
    <div class="row-2">
        <div>
            <label>Trecho</label>
            <input id="trecho">
        </div>
        <div>
            <label>Relato da falha:</label>
            <input id="relatoFalha">
        </div>
    </div>

    <!-- Linha 4 -->
    <div class="full-row">
        <label>Zona Quente</label>
        <label><input type="radio" name="zonaQuente" value="SIM"> SIM</label>
        <label><input type="radio" name="zonaQuente" value="NÃO"> NÃO</label>
    </div>

    <!-- Linha 5 -->
    

    <!-- Linha 6 -->
    <div class="full-row">
        <label>Status atual</label>
        <textarea id="statusAtual"></textarea>
    </div>

    
    <div class="full-row">
        <label>Corredor</label>
        <label><input type="radio" name="corredor" value="CENTRO-LESTE"> CENTRO-LESTE</label>
        <label><input type="radio" name="corredor" value="CENTRO-NORTE"> CENTRO-NORTE</label>
        <label><input type="radio" name="corredor" value="CENTRO-SUDESTE"> CENTRO-SUDESTE</label>
        <label><input type="radio" name="corredor" value="MINAS-BAHIA"> MINAS-BAHIA</label>
        <label><input type="radio" name="corredor" value="MINAS-RIO"> MINAS-RIO</label>
    </div>

</div>


        <div class="actions">
            <button onclick="gerarCCM()" class="btn-primary">Gerar</button>
            <button onclick="copiar()" class="btn-secondary">Copiar</button>
        </div>

    </section>

    <section id="aba-pt" class="card" style="display:none;">
        <div class="section-title">Passagem de Turno CCM</div>

        <div class="form-container" style="max-height: 55vh; overflow-y: auto; padding-right: 8px;">
            
            <div class="row-2">
                <div class="full-row">
                    <label>Plantonista</label>
                    <input id="pt-plantonista" type="text" value="Gledson Cauã Pinheiro Leão">
                </div>
                <div class="full-row">
                    <label>Turno</label>
                    <label><input type="radio" name="pt-turno" value="MANHÃ"> MANHÃ</label>
                    <label><input type="radio" name="pt-turno" value="TARDE"> TARDE</label>
                    <label><input type="radio" name="pt-turno" value="NOTURNO"> NOTURNO</label>
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border); width: 100%; margin: 5px 0;">

            <div class="row-2">
                <div class="full-row">
                    <label>Tratou todos os registos SAF?</label>
                    <label><input type="radio" name="pt-saf" value="Sim"> Sim</label>
                    <label><input type="radio" name="pt-saf" value="Não"> Não</label>
                </div>
                <div class="full-row">
                    <label>Registos pendentes:</label>
                    <input id="pt-saf-pend" type="text" placeholder="Ex: SEM PENDÊNCIAS">
                </div>
            </div>

            <div class="row-2">
                <div class="full-row">
                    <label>Tratou os alarmes MDW?</label>
                    <label><input type="radio" name="pt-mdw" value="Sim"> Sim</label>
                    <label><input type="radio" name="pt-mdw" value="Não"> Não</label>
                </div>
                <div class="full-row">
                    <label>Pendentes ou último tratado:</label>
                    <input id="pt-mdw-pend" type="text" placeholder="-">
                </div>
            </div>

            <div class="row-2">
                <div class="full-row">
                    <label>Alarmes DTQ e DDC tratados?</label>
                    <label><input type="radio" name="pt-dtq" value="Sim"> Sim</label>
                    <label><input type="radio" name="pt-dtq" value="Não"> Não</label>
                </div>
                <div class="full-row">
                    <label>Pendentes ou último tratado:</label>
                    <input id="pt-dtq-pend" type="text" placeholder="Ex: NÃO TEVE">
                </div>
            </div>

            <div class="full-row">
                <label>Alarmes Telecom tratados?</label>
                <label><input type="radio" name="pt-telecom" value="Sim"> Sim</label>
                <label><input type="radio" name="pt-telecom" value="Não"> Não</label>
            </div>
            <div class="row-2">
                <div class="full-row">
                    <label>Último alarme (>1h) tratado:</label>
                    <input id="pt-telecom-ultimo" type="text" placeholder="Ex: Firewall_Link...">
                </div>
                <div class="full-row">
                    <label>Quais eventos pendentes:</label>
                    <input id="pt-telecom-pend" type="text" placeholder="Ex: SEM PENDÊNCIAS">
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border); width: 100%; margin: 5px 0;">

            <div class="full-row">
                <label>Acionamento realizado? Se sim, quais?</label>
                <input id="pt-acionamentos" type="text" placeholder="-">
            </div>
            <div class="full-row">
                <label>Acionamentos ou atividades em andamento?</label>
                <textarea id="pt-acionamentos-andamento" placeholder="- Termómetros: ETM - Sem comunicar" style="min-height: 80px;"></textarea>
            </div>

            <div class="full-row">
                <label>Pontos de Atenção / Instruções (novas):</label>
                <textarea id="pt-atencao" style="min-height: 120px;"></textarea>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border); width: 100%; margin: 5px 0;">

            <div class="row-2">
                <div class="full-row">
                    <label>Notificações E-mail SAF?</label>
                    <label><input type="radio" name="pt-not-saf" value="Sim"> Sim</label>
                    <label><input type="radio" name="pt-not-saf" value="Não"> Não</label>
                </div>
                <div class="full-row">
                    <label>Notificações WhatsApp?</label>
                    <label><input type="radio" name="pt-not-wpp" value="Sim"> Sim</label>
                    <label><input type="radio" name="pt-not-wpp" value="Não"> Não</label>
                </div>
            </div>

            <div class="row-2">
                <div class="full-row">
                    <label>App Eletro encerrados?</label>
                    <label><input type="radio" name="pt-not-eletro" value="Sim"> Sim</label>
                    <label><input type="radio" name="pt-not-eletro" value="Não"> Não</label>
                </div>
                <div class="full-row">
                    <label>Tag do último encerramento:</label>
                    <input id="pt-tag-eletro" type="text" placeholder="-">
                </div>
            </div>

        </div>

        <div class="actions">
            <button onclick="gerarPT()" class="btn-primary">Gerar Relatório</button>
            <button onclick="copiar()" class="btn-secondary">Copiar</button>
        </div>
    </section>

    <!-- ✅ PREVIEW (Compartilhado) -->
    <section class="card preview-card">
        <div class="section-title">Pré-visualização (WhatsApp)</div>
        <div id="saida" class="preview-body"></div>
        <div id="status" class="status-msg"></div>
    </section>

</main>

</body>
</html>

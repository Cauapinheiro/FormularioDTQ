<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador - VLI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="informativo.css" rel="stylesheet">
    <script src="informativo.js" defer></script>
</head>

<body>

<header class="header">
    <div class="container header-top">
        <div class="header-left">
            <span class="plate">GR · TECNOLOGIA</span>
            <h1>Gerador Operacional</h1>
        </div>
        <div class="theme-switch" id="theme-toggle" role="button" aria-label="Alternar tema dia/noite">
            <span class="ts-label ts-off">DIA</span>
            <span class="ts-label ts-on">NOITE</span>
            <div class="ts-thumb"></div>
        </div>
    </div>
    <div class="container sub-plate">CCM</div>
</header>

<!-- FAIXA DE TRILHO ANIMADA -->
<div class="track-strip" aria-hidden="true">
    <div class="rail-line"></div>
    <div class="train-wrap">
        <svg width="150" height="46" viewBox="0 0 200 60" class="train-svg">
            <rect x="4" y="26" width="52" height="24" rx="3" fill="var(--accent)"></rect>
            <rect x="10" y="10" width="26" height="20" rx="2" fill="var(--accent)"></rect>
            <rect x="14" y="14" width="8" height="8" fill="var(--header)"></rect>
            <rect x="60" y="30" width="60" height="20" rx="2" fill="var(--accent2)"></rect>
            <rect x="126" y="30" width="60" height="20" rx="2" fill="var(--accent2)"></rect>
            <circle cx="18" cy="52" r="7" fill="var(--rail-dark)"></circle>
            <circle cx="44" cy="52" r="7" fill="var(--rail-dark)"></circle>
            <circle cx="74" cy="52" r="6" fill="var(--rail-dark)"></circle>
            <circle cx="106" cy="52" r="6" fill="var(--rail-dark)"></circle>
            <circle cx="140" cy="52" r="6" fill="var(--rail-dark)"></circle>
            <circle cx="172" cy="52" r="6" fill="var(--rail-dark)"></circle>
        </svg>
    </div>
</div>

<!-- ABAS -->
<div class="tab-bar">
    <button class="tab-btn active" id="tab-dtq" onclick="trocarAba('dtq')"><span class="dot"></span>Trilho Quebrado</button>
    <button class="tab-btn" id="tab-ccm" onclick="trocarAba('ccm')"><span class="dot"></span>Alerta CCM</button>
    <button class="tab-btn" id="tab-info" onclick="trocarAba('info')"><span class="dot"></span>Informativo</button>
</div>

<main class="grid">

    <!-- ✅ ABA 1 - DTQ -->
    <section id="aba-dtq" class="card">
        <div class="section-title">Trilho Quebrado</div>

        <div class="form-container">
            <div class="row-2">
                <div>
                    <label>Título</label>
                    <input id="titulo" type="text" value="*Alarme de Trilho Quebrado*">
                </div>
                <div>
                    <label>Local</label>
                    <input id="local" type="text">
                </div>
            </div>

            <div class="row-2">
                <div>
                    <label>Data/Hora</label>
                    <input id="dataHora" type="datetime-local">
                </div>
                <div>
                    <label>Resistência</label>
                    <input id="resistencia" type="number">
                </div>
            </div>

            <div class="row-2">
                <div>
                    <label>Previsão</label>
                    <input id="previsao" type="text">
                </div>
            </div>

            <div class="full-row">
                <label>Situação</label>
                <textarea id="situacao"></textarea>
            </div>
        </div>

        <div class="actions">
            <button onclick="gerar()" class="btn-primary">Gerar</button>
            <button onclick="copiar()" class="btn-secondary">Copiar</button>
            <button onclick="limparFormulario('aba-dtq')" class="btn-secondary">Limpar</button>
        </div>
    </section>


    <!-- ✅ ABA 2 - CCM -->
    <section id="aba-ccm" class="card" style="display:none;">
        <div class="section-title">Alerta CCM</div>

        <div class="form-container">

    <div class="row-2">
        <div>
            <label>Tipo de Equipamento</label>
            <input id="tipoEquipamento">
        </div>
        <div>
            <label>TAG</label>
            <input id="tag">
        </div>
    </div>

    <div class="full-row">
        <label>Descrição do Ativo</label>
        <input id="descricaoAtivo">
    </div>

    <div class="row-2">
        <div>
            <label>Trem</label>
            <input id="trem">
        </div>
        <div>
            <label>Data/Hora</label>
            <input id="dataHoraCCM" type="text" placeholder="Ex: 22/05/2026 09:15">
        </div>
    </div>

    <div class="row-2">
        <div>
            <label>Trecho</label>
            <input id="trecho">
        </div>
        <div>
            <label>Relato da falha:</label>
            <input id="relatoFalha">
        </div>
    </div>

    <div class="full-row">
        <label>Zona Quente</label>
        <label><input type="radio" name="zonaQuente" value="SIM"> SIM</label>
        <label><input type="radio" name="zonaQuente" value="NÃO"> NÃO</label>
    </div>

    <div class="full-row">
        <label>Status atual</label>
        <textarea id="statusAtual"></textarea>
    </div>

    <div class="full-row">
        <label>Corredor</label>
        <label><input type="radio" name="corredor" value="CENTRO-LESTE"> CENTRO-LESTE</label>
        <label><input type="radio" name="corredor" value="CENTRO-NORTE"> CENTRO-NORTE</label>
        <label><input type="radio" name="corredor" value="CENTRO-SUDESTE"> CENTRO-SUDESTE</label>
        <label><input type="radio" name="corredor" value="MINAS-BAHIA"> MINAS-BAHIA</label>
        <label><input type="radio" name="corredor" value="MINAS-RIO"> MINAS-RIO</label>
    </div>

</div>


        <div class="actions">
            <button onclick="gerarCCM()" class="btn-primary">Gerar</button>
            <button onclick="copiar()" class="btn-secondary">Copiar</button>
            <button onclick="limparFormulario('aba-ccm')" class="btn-secondary">Limpar</button>
        </div>

    </section>

    <!-- ✅ ABA 3 - INFORMATIVO (Informativo / Atualização / Encerramento) -->
    <section id="aba-info" class="card" style="display:none;">
        <div class="section-title">Informativo de Ocorrência</div>

        <div class="form-container">

            <div class="full-row">
                <label>Local (entra entre parênteses no título)</label>
                <input id="info-local" type="text" placeholder="Ex: ZNI, ZZB, ZCB, EBH...">
            </div>

            <div class="full-row">
                <label>Estágio</label>
                <label><input type="radio" name="info-estagio" value="informativo" checked onchange="trocarEstagioInfo('informativo')"> Informativo</label>
                <label><input type="radio" name="info-estagio" value="atualizacao" onchange="trocarEstagioInfo('atualizacao')"> Atualização</label>
                <label><input type="radio" name="info-estagio" value="encerramento" onchange="trocarEstagioInfo('encerramento')"> Encerramento</label>
            </div>

            <hr class="divider">

            <!-- Campos: INFORMATIVO -->
            <div id="info-bloco-informativo">
                <div class="row-2">
                    <div>
                        <label>Ativo</label>
                        <input id="info-ativo" type="text">
                    </div>
                    <div>
                        <label>Horário</label>
                        <input id="info-horario" type="text" placeholder="Ex: 14:35">
                    </div>
                </div>
                <div class="full-row">
                    <label>Descrição da falha</label>
                    <textarea id="info-descricao"></textarea>
                </div>
                <div class="full-row">
                    <label>Impacto</label>
                    <input id="info-impacto" type="text">
                </div>
                <div class="full-row">
                    <label>Acionamentos realizados</label>
                    <input id="info-acionamentos" type="text">
                </div>
                <div class="full-row">
                    <label>Previsão de atendimento</label>
                    <input id="info-previsao" type="text">
                </div>
            </div>

            <!-- Campos: ATUALIZAÇÃO -->
            <div id="info-bloco-atualizacao" style="display:none;">
                <div class="row-2">
                    <div>
                        <label>Nº da atualização</label>
                        <input id="info-num-atualizacao" type="number" min="1" value="1">
                    </div>
                    <div>
                        <button type="button" class="btn-secondary" onclick="reiniciarNumeracaoInfo()">🔄 Reiniciar numeração</button>
                    </div>
                </div>
                <div class="row-2">
                    <div>
                        <label>Horário que o técnico chegou no local</label>
                        <input id="info-tec-horario" type="text" placeholder="Ex: 15:10">
                    </div>
                    <div>
                        <label>Técnico realizando atendimento</label>
                        <input id="info-tecnico" type="text">
                    </div>
                </div>
                <div class="full-row">
                    <label>Ação realizada até o momento</label>
                    <textarea id="info-acao"></textarea>
                </div>
                <div class="full-row">
                    <label>Previsão de normalização</label>
                    <input id="info-previsao-normalizacao" type="text">
                </div>
            </div>

            <!-- Campos: ENCERRAMENTO -->
            <div id="info-bloco-encerramento" style="display:none;">
                <div class="full-row">
                    <label>Diagnóstico</label>
                    <textarea id="info-diagnostico"></textarea>
                </div>
                <div class="full-row">
                    <label>Atividade executada</label>
                    <textarea id="info-atividade"></textarea>
                </div>
                <div class="full-row">
                    <label>Impacto</label>
                    <input id="info-impacto-enc" type="text">
                </div>
                <div class="full-row">
                    <label>Finalização do evento</label>
                    <input id="info-finalizacao" type="text" placeholder="Ex: Evento normalizado às 16:20">
                </div>
            </div>

        </div>

        <div class="actions">
            <button onclick="gerarInformativo()" class="btn-primary">Gerar</button>
            <button onclick="copiar()" class="btn-secondary">Copiar</button>
            <button onclick="limparFormulario('aba-info')" class="btn-secondary">Limpar</button>
        </div>
    </section>

    <!-- ✅ PREVIEW ESTILO WHATSAPP -->
    <section class="card preview-card">
        <div class="wa-mock">
            <div class="wa-header">
                <div class="wa-avatar">GR</div>
                <div class="wa-header-text">
                    <div class="wa-name">Pré-visualização</div>
                    <div class="wa-sub">mensagem gerada automaticamente</div>
                </div>
            </div>
            <div class="wa-body">
                <div class="wa-empty" id="wa-empty">Preencha o formulário e clique em Gerar para ver a prévia da mensagem.</div>
                <div class="wa-bubble" id="wa-bubble" style="display:none;">
                    <div id="saida" class="wa-text"></div>
                    <div class="wa-meta"><span id="wa-time"></span><span class="wa-check">✓✓</span></div>
                </div>
            </div>
        </div>
        <div id="status" class="status-msg"></div>
    </section>

</main>

</body>
</html>
